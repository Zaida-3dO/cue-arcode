name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.2.0). Leave blank to auto-increment from latest tag."
        required: false
        default: ""

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    name: Determine version tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute and push tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "${{ github.event.inputs.version }}" ]; then
            next="${{ github.event.inputs.version }}"
          else
            git fetch --tags
            latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
            if [ -z "$latest" ]; then
              next="v0.1.0"
            else
              major=$(echo "$latest" | cut -d. -f1 | tr -d 'v')
              minor=$(echo "$latest" | cut -d. -f2)
              next="v${major}.$((minor + 1)).0"
            fi
          fi

          echo "Tagging $next"
          git tag "$next"
          git push origin "$next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

  publish:
    name: Build + push Docker image, create GitHub Release
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ needs.tag.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/cue-arcode:latest
            ghcr.io/${{ github.repository_owner }}/cue-arcode:${{ needs.tag.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.tag.outputs.tag }}" \
            --title "${{ needs.tag.outputs.tag }}" \
            --generate-notes
